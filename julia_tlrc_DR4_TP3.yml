# ==============================================================================
# ETAPA 1 — .github/workflows/self-hosted-demo.yml
# Runner auto-hospedado com instalação de software adicional (jq)
#
# Registro do runner (executar uma vez na máquina local):
#   mkdir actions-runner && cd actions-runner
#   curl -o actions-runner-linux-x64-2.315.0.tar.gz -L \
#     https://github.com/actions/runner/releases/download/v2.315.0/actions-runner-linux-x64-2.315.0.tar.gz
#   tar xzf ./actions-runner-linux-x64-2.315.0.tar.gz
#   ./config.sh --url https://github.com/juliatlrc/devops --token <TOKEN>
#   ./run.sh
# ==============================================================================

name: "TP3 - Etapa 1 - Self-Hosted Runner"

on:
  workflow_dispatch:

jobs:
  demo-self-hosted:
    name: Executa no runner local
    runs-on: self-hosted

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Informações do sistema operacional
        run: uname -a

      - name: Versão do Java no runner
        run: java -version

      - name: Versão do Docker no runner
        run: docker --version

      - name: Identificação do runner
        run: |
          echo "Runner name : ${{ runner.name }}"
          echo "Runner OS   : ${{ runner.os }}"
          echo "Workspace   : ${{ github.workspace }}"

      - name: Instalar jq (software adicional via apt)
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y jq
          echo "jq instalado:"
          jq --version

      - name: Usar jq para listar serviços do docker-compose
        run: |
          cat docker-compose.yml \
            | python3 -c "import sys,json,yaml; print(json.dumps(yaml.safe_load(sys.stdin),indent=2))" \
            | jq '.services | keys'


---


# ==============================================================================
# ETAPA 2 — .github/workflows/vars-and-secrets-demo.yml
# Variáveis e secrets usando ${{ vars.* }} e ${{ secrets.* }}
#
# Configurar em Settings > Secrets and variables > Actions:
#   Variables : APP_MODE=production  |  SUPPORT_EMAIL=suporte@ricknmorty.dev
#   Secrets   : PROD_TOKEN=<token>
# ==============================================================================

name: "TP3 - Etapa 2 - Variaveis e Secrets"

on:
  workflow_dispatch:

jobs:
  demo-vars:
    name: Demonstra variáveis não-sensíveis
    runs-on: ubuntu-latest

    steps:
      - name: Exibir variáveis de repositório
        run: |
          echo "APP_MODE      = ${{ vars.APP_MODE }}"
          echo "SUPPORT_EMAIL = ${{ vars.SUPPORT_EMAIL }}"

      - name: Configurar modo da aplicação via variável
        run: |
          if [ "${{ vars.APP_MODE }}" = "production" ]; then
            echo "Modo: PRODUÇÃO — otimizações ativas, logs reduzidos."
          else
            echo "Modo: DESENVOLVIMENTO — logs completos."
          fi

  demo-secrets:
    name: Passo protegido com secret
    runs-on: ubuntu-latest
    needs: demo-vars

    steps:
      - name: Autenticação simulada com PROD_TOKEN
        env:
          TOKEN: ${{ secrets.PROD_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERRO: PROD_TOKEN não definido."
            exit 1
          fi
          echo "Token presente (valor mascarado): ***"
          echo "Autenticação bem-sucedida. Deploy autorizado."


---


# ==============================================================================
# ETAPA 3 — .github/workflows/env-context-demo.yml
# Contextos e escopos: workflow-level, job-level, step-level
# ==============================================================================

name: "TP3 - Etapa 3 - Env Context Demo"

on:
  workflow_dispatch:

env:
  STAGE: test
  APP_NAME: ricknmorty-api
  PIPELINE_VERSION: "3.0"

jobs:
  env-demo:
    name: Demonstra escopos de env vars
    runs-on: ubuntu-latest

    env:
      DEPLOY_ENV: staging
      APP_NAME: ricknmorty-api-job-override

    steps:
      - name: Exibir contexto do GitHub
        run: |
          echo "Usuário que acionou : ${{ github.actor }}"
          echo "Branch / ref        : ${{ github.ref }}"
          echo "Evento disparador   : ${{ github.event_name }}"
          echo "SHA do commit       : ${{ github.sha }}"
          echo "Sistema operacional : ${{ runner.os }}"
          echo "Arquitetura         : ${{ runner.arch }}"

      - name: Exibir vars de workflow e job
        run: |
          echo "STAGE            = $STAGE"
          echo "PIPELINE_VERSION = $PIPELINE_VERSION"
          echo "APP_NAME         = $APP_NAME   (job sobrescreve workflow)"
          echo "DEPLOY_ENV       = $DEPLOY_ENV"

      - name: Exibir var sobrescrita no step
        env:
          STAGE: production
          STEP_ONLY: "so-aqui"
        run: |
          echo "STAGE     (step sobrescreve workflow) = $STAGE"
          echo "APP_NAME  (herda do job)              = $APP_NAME"
          echo "STEP_ONLY (só existe neste step)      = $STEP_ONLY"

      - name: Confirmar que STEP_ONLY não vaza
        run: |
          echo "STEP_ONLY aqui = '${STEP_ONLY}' (deve estar vazio)"
          echo "STAGE voltou a = $STAGE (deve ser 'test')"



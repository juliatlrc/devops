name: CI - Rick & Morty API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Executar testes automatizados?"
        required: false
        default: true
        type: boolean
      run_lint:
        description: "Executar lint (Checkstyle)?"
        required: false
        default: true
        type: boolean

jobs:
  # ──────────────────────────────────────────
  # Tarefa 1: Action externa do Marketplace
  # ──────────────────────────────────────────
  security-scan:
    name: Análise de Segurança (OWASP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Executar OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ricknmorty-api"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload relatório de segurança
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ──────────────────────────────────────────
  # Tarefa 3: Chama o workflow reutilizável
  # ──────────────────────────────────────────
  lint-and-test:
    name: Lint e Testes
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: ${{ inputs.run_tests == null || inputs.run_tests }}
      run_lint: ${{ inputs.run_lint == null || inputs.run_lint }}

  # ──────────────────────────────────────────
  # Build final
  # ──────────────────────────────────────────
  build:
    name: Build da Aplicação
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build com Maven
        run: mvn package -DskipTests

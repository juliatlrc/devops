# Questão 2 — Orquestração API + Banco
# docker-compose.yml
#
# Decisões técnicas:
#   - Banco NÃO expõe a porta 5432 para o host (sem ports no serviço db)
#   - API se conecta ao banco usando o nome do serviço "db" — não localhost
#   - Rede interna isolada: apenas os dois containers se enxergam
#   - Volume nomeado garante persistência dos dados entre reinicializações
#   - healthcheck no banco evita race condition: API só sobe quando Postgres estiver pronto

services:

  # ---- Serviço 1: Banco de dados ----
  db:
    build:
      context: ./banco
      dockerfile: Dockerfile
    container_name: ricknmorty-db
    environment:
      POSTGRES_DB: ricknmorty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Volume nomeado — dados sobrevivem ao docker-compose down
      - pgdata:/var/lib/postgresql/data
    networks:
      - ricknmorty-net
    # SEM "ports:" — porta 5432 não é acessível pelo host (requisito do enunciado)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ricknmorty"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---- Serviço 2: API Spring Boot ----
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ricknmorty-api
    environment:
      # A API usa o nome "db" — Docker resolve via DNS interno da rede
      # localhost aqui se referiria ao próprio container da API, não ao banco
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ricknmorty
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      # Apenas a API é exposta para o host — banco permanece interno
      - "8080:8080"
    networks:
      - ricknmorty-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

# ---- Volume nomeado ----
volumes:
  pgdata:
    driver: local

# ---- Rede interna isolada ----
networks:
  ricknmorty-net:
    driver: bridge

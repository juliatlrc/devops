# TP3 — Etapa 2: Variáveis e Secrets
#
# CONFIGURAR ANTES DE EXECUTAR:
#   Settings > Secrets and variables > Actions
#
#   Variables (não-sensíveis — ficam visíveis no YAML):
#     APP_MODE      = production
#     SUPPORT_EMAIL = suporte@ricknmorty.dev
#
#   Secrets (sensíveis — valor mascarado nos logs como ***):
#     PROD_TOKEN    = meu-token-de-deploy-secreto

name: "TP3 - Etapa 2 - Variaveis e Secrets"

on:
  workflow_dispatch:

jobs:
  demo-vars:
    name: Demonstra variáveis não-sensíveis
    runs-on: ubuntu-latest

    steps:
      - name: Exibir variáveis de repositório
        run: |
          echo "==============================="
          echo " Variáveis de repositório"
          echo "==============================="
          echo "APP_MODE      = ${{ vars.APP_MODE }}"
          echo "SUPPORT_EMAIL = ${{ vars.SUPPORT_EMAIL }}"

      # Variável usada para configurar comportamento real do pipeline
      - name: Configurar modo da aplicação
        run: |
          if [ "${{ vars.APP_MODE }}" = "production" ]; then
            echo "Modo: PRODUÇÃO — otimizações ativas, logs reduzidos."
          elif [ "${{ vars.APP_MODE }}" = "development" ]; then
            echo "Modo: DESENVOLVIMENTO — logs completos, debug habilitado."
          else
            echo "AVISO: APP_MODE não definido ou valor desconhecido."
          fi

      - name: Simular envio de e-mail de suporte
        run: |
          echo "Notificação seria enviada para: ${{ vars.SUPPORT_EMAIL }}"

  demo-secrets:
    name: Demonstra secret em passo protegido
    runs-on: ubuntu-latest
    needs: demo-vars

    steps:
      # O secret é injetado como variável de ambiente — nunca exposto no YAML diretamente
      # O GitHub mascara automaticamente o valor nos logs (aparece como ***)
      - name: Autenticação simulada com PROD_TOKEN (passo protegido)
        env:
          TOKEN: ${{ secrets.PROD_TOKEN }}
        run: |
          echo "==============================="
          echo " Passo protegido — autenticação"
          echo "==============================="
          if [ -z "$TOKEN" ]; then
            echo "ERRO: PROD_TOKEN não definido. Configure o secret no repositório."
            exit 1
          fi
          echo "Token presente (valor mascarado pelo GitHub): ***"
          echo "Simulando autenticação na API de deploy..."
          echo "Autenticação bem-sucedida. Deploy autorizado."

# TP3 - Etapa 5a: Deploy automatico para DEV
# Dispara em pushes na branch dev
# Ambiente dev: sem aprovacao, deploy automatico
#
# Configurar em Settings > Environments > dev:
#   Variable: DEV_API_URL = http://dev.ricknmorty.internal:8080

name: "TP3 - Etapa 5a - Deploy DEV"

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    name: Deploy automatico para DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Informacoes do deploy
        run: |
          echo "Ambiente  : dev"
          echo "Branch    : ${{ github.ref_name }}"
          echo "Commit    : ${{ github.sha }}"
          echo "Autor     : ${{ github.actor }}"
          echo "API URL   : ${{ vars.DEV_API_URL }}"

      - name: Simular build da imagem Docker
        run: |
          echo "Simulando: docker compose build ricknmorty-api"
          echo "Build concluido com sucesso."

      - name: Simular push para registry DEV
        run: |
          echo "Simulando: docker push registry.dev/ricknmorty-api:${{ github.sha }}"
          echo "Imagem enviada com SHA ${{ github.sha }}"

      - name: Simular restart do servico em DEV
        run: |
          echo "Reiniciando servico em ${{ vars.DEV_API_URL }}..."
          echo "Health check OK."
          echo "Deploy em DEV concluido automaticamente."

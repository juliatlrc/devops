# TP3 - Etapa 5b: Deploy com aprovacao manual para PROD
# Dispara em pushes na branch main
# Ambiente prod: requer aprovacao manual antes de executar
#
# Configurar em Settings > Environments > prod:
#   Required reviewers: <seu usuario>
#   Secret:   PROD_REGISTRY_TOKEN = qualquer-valor
#   Variable: PROD_API_URL = https://api.ricknmorty.dev

name: "TP3 - Etapa 5b - Deploy PROD"

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    name: Deploy com aprovacao para PROD
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Informacoes do deploy
        run: |
          echo "Ambiente  : prod"
          echo "Branch    : ${{ github.ref_name }}"
          echo "Commit    : ${{ github.sha }}"
          echo "Autor     : ${{ github.actor }}"
          echo "API URL   : ${{ vars.PROD_API_URL }}"

      - name: Autenticar no registry de producao
        env:
          REGISTRY_TOKEN: ${{ secrets.PROD_REGISTRY_TOKEN }}
        run: |
          if [ -z "$REGISTRY_TOKEN" ]; then
            echo "ERRO: PROD_REGISTRY_TOKEN nao definido no ambiente prod."
            exit 1
          fi
          echo "Autenticado no registry de producao (token presente)."

      - name: Simular build da imagem Docker
        run: |
          echo "Simulando: docker compose build ricknmorty-api"
          echo "Build concluido com sucesso."

      - name: Simular push para registry PROD
        run: |
          echo "Simulando: docker push registry.prod/ricknmorty-api:${{ github.sha }}"
          echo "Imagem enviada com SHA ${{ github.sha }}"

      - name: Simular deploy em PROD
        run: |
          echo "Aplicando nova versao em ${{ vars.PROD_API_URL }}..."
          echo "Health check OK."
          echo "Deploy em PROD concluido apos aprovacao manual."
